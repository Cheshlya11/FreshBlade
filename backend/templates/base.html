{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}FreshBlade{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #17161a;
        --surface: #201f24;
        --surface-line: #2f2e34;
        --text: #f1ece2;
        --text-dim: #a79e93;
        --gold: #c9a05c;
        --crimson: #8b3a3a;
        --navy: #3b5166;
        --radius: 4px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--surface-line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .pole {
        width: 10px;
        height: 28px;
        border-radius: 2px;
        background: repeating-linear-gradient(
          45deg,
          var(--crimson) 0px,
          var(--crimson) 4px,
          var(--text) 4px,
          var(--text) 8px,
          var(--navy) 8px,
          var(--navy) 12px
        );
        flex-shrink: 0;
      }

      .brand {
        font-family: "Fraunces", serif;
        font-size: 1.25rem;
        letter-spacing: 0.02em;
      }

      .nav-auth {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-left: auto;
      }

      .nav-user {
        font-size: 0.85rem;
        color: var(--text-dim);
      }

      .nav-link {
        font-size: 0.85rem;
        color: var(--text-dim);
        text-decoration: none;
      }

      .nav-link--accent {
        color: var(--gold);
      }

      .logout-form {
        margin: 0;
      }

      .nav-link--button {
        background: none;
        border: none;
        width: auto;
        padding: 0;
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-dim);
        cursor: pointer;
        font-family: inherit;
      }

      .nav-link--button:hover {
        color: var(--gold);
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .auth-card {
        display: flex;
        width: 100%;
        max-width: 780px;
        max-height: 75vh;
        background: var(--surface);
        border: 1px solid var(--surface-line);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .auth-card__side {
        width: 36%;
        background: repeating-linear-gradient(
          135deg,
          var(--crimson) 0px,
          var(--crimson) 14px,
          var(--text) 14px,
          var(--text) 28px,
          var(--navy) 28px,
          var(--navy) 42px
        );
        display: none;
        flex-shrink: 0;
      }

      .auth-card__form {
        flex: 1;
        padding: 3rem 2.5rem;
        overflow-y: auto;
      }

      h1 {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 1.75rem;
        margin: 0 0 0.4rem;
      }

      .subtitle {
        color: var(--text-dim);
        font-size: 0.9rem;
        margin: 0 0 2rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .form-row p {
        margin: 0 0 0rem;
      }

      label {
        display: block;
        font-size: 0.8rem;
        color: var(--text-dim);
        margin-bottom: 0.4rem;
      }

      input {
        width: 100%;
        padding: 0.65rem 0.75rem;
        background: var(--bg);
        border: 1px solid var(--surface-line);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 0.95rem;
        font-family: inherit;
      }

      input:focus {
        outline: none;
        border-color: var(--gold);
      }

      ul {
        list-style-type: none;
        padding: 0;
        margin: 0.4rem 0 1.1rem;
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.5;
      }

      ul.errorlist {
        color: var(--crimson);
      }

      .has-error input {
        border-color: var(--crimson);
      }

      .has-error label {
        color: var(--crimson);
      }

      .form-errors p {
        color: var(--crimson);
        font-size: 0.85rem;
        margin: 0 0 1rem;
      }

      button {
        width: 100%;
        padding: 0.75rem;
        margin-top: 0.5rem;
        background: var(--gold);
        color: var(--bg);
        border: none;
        border-radius: var(--radius);
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.08);
      }

      .switch-link {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: var(--text-dim);
        text-align: center;
      }

      .switch-link a {
        color: var(--gold);
        text-decoration: none;
      }

      @media (min-width: 640px) {
        .auth-card__side {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="pole"></div>
      <span class="brand">FreshBlade</span>
      <nav class="nav-auth">
        {% if user.is_authenticated %}
        <span class="nav-user"
          >{{ user.get_full_name|default:user.email }}</span
        >
        <form
          method="post"
          action="{% url 'accounts:logout' %}"
          class="logout-form"
        >
          {% csrf_token %}
          <button type="submit" class="nav-link nav-link--button">
            Log out
          </button>
        </form>
        {% else %}
        <a href="{% url 'accounts:login' %}" class="nav-link">Log in</a>
        <a
          href="{% url 'accounts:register' %}"
          class="nav-link nav-link--accent"
          >Register</a
        >
        {% endif %}
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
